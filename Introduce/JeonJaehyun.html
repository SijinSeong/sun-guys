<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전재현 소개</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 48px 40px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: #4f46e5;
        color: white;
        font-size: 2.4rem;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }

      h1 {
        font-size: 1.8rem;
        color: #1a1a1a;
        margin-bottom: 8px;
      }

      .role {
        font-size: 1rem;
        color: #6b7280;
        margin-bottom: 32px;
      }

      .section {
        text-align: left;
        margin-bottom: 24px;
      }

      .section h2 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9ca3af;
        margin-bottom: 12px;
      }

      .section p {
        font-size: 0.95rem;
        color: #374151;
        line-height: 1.7;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        background-color: #eef2ff;
        color: #4f46e5;
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.85rem;
        font-weight: 500;
      }

      .back {
        display: inline-block;
        margin-top: 32px;
        font-size: 0.9rem;
        color: #4f46e5;
        text-decoration: none;
      }

      .back:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar">전</div>
      <h1>전재현</h1>
      <p class="role">Frontend Developer</p>

      <div class="section">
        <h2>About</h2>
        <p>
          안녕하세요! 저는 전재현입니다. 새로운 기술을 배우는 것을 즐기고, 팀과
          함께 성장하는 것을 좋아합니다.
        </p>
      </div>

      <div class="section">
        <h2>Skills</h2>
        <div class="tags">
          <span class="tag">HTML</span>
          <span class="tag">CSS</span>
          <span class="tag">JavaScript</span>
          <span class="tag">Git</span>
        </div>
      </div>

      <div class="section">
        <h2>담당 업무</h2>
        <p>자기소개 페이지 개발</p>
      </div>

      <a href="../index.html" class="back">← 메인으로 돌아가기</a>
    </div>
  </body>
</html>
