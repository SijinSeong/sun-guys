<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>김재현 소개</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: #f5f5f5;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
      }
      h1 {
        color: #333;
      }
      h2 {
        margin-top: 20px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>김재현</h1>
        <p><strong>문제 해결 중심으로 성장 중인 Unity & 웹 개발자</strong></p>
      </header>

      <section>
        <h2>기본 정보</h2>
        <p>전공: 컴퓨터 공학부</p>
        <p>관심 분야: 게임 개발, 웹 개발</p>
      </section>

      <section>
        <h2>기술 스택</h2>
        <p>Vue, JavaScript, Unity(C#), Git</p>

        <h2>프로젝트 경험</h2>
        <ul>
          <li>Unity 3D 팀 프로젝트 (맵 디자인 및 로직 구현)</li>
          <li>Vue 가계부 프로젝트</li>
        </ul>
      </section>

      <section>
        <h2>협업 스타일</h2>
        <ul>
          <li>문제 발생 시 빠르게 공유</li>
          <li>꾸준한 커뮤니케이션</li>
          <li>맡은 역할에 책임감 있게 임함</li>
        </ul>
      </section>

      <footer>
        <h2>한마디</h2>
        <p>팀에 도움이 되는 개발자가 되겠습니다.</p>
      </footer>
    </div>
  </body>
</html>
